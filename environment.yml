name: dpamsa
# ─────────────────────────────────────────────────────────────────────────────
# USE THIS FILE on a fresh local machine where you control disk space.
#
# ON DATAHUB / DSMLP — do NOT run `conda env create` from this file;
# the base environment already has PyTorch+CUDA and disk quotas are tight.
# Instead run:  bash setup_env.sh
# That installs only the missing packages (~5 MB) into the existing kernel.
# ─────────────────────────────────────────────────────────────────────────────
channels:
  - pytorch
  - nvidia
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  # PyTorch — change cuda version to match your driver (check: nvidia-smi)
  - pytorch::pytorch
  - pytorch::pytorch-cuda=11.8
  # Scientific stack
  - numpy
  - pandas
  - matplotlib
  - scipy
  # Bioinformatics
  - biopython          # ~5 MB
  - bioconda::mafft    # ~3 MB
  # Utilities
  - tqdm
